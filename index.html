<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Weekday Finder | Premium Web App</title>
    <meta name="description" content="Discover the day of the week for any date with our premium, glassmorphic Date Weekday Finder.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="container">
        <section class="glass-card" id="app-card">
            <header>
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="calendar-icon">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
                <h1>Weekday Finder</h1>
                <p>Select a date to see its weekday</p>
            </header>

            <div class="input-group">
                <label for="date-input" class="sr-only">Choose a date</label>
                <div class="date-input-wrapper">
                    <input type="date" id="date-input" class="date-picker">
                </div>
            </div>

            <div id="result-container" class="result-container hidden">
                <p class="result-label">It's a</p>
                <h2 id="weekday-display" class="weekday-name">Monday</h2>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
